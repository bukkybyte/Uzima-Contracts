name: uzima_sdk_flutter
description: Flutter plugin for Stellar Uzima medical records SDK
version: 1.0.0
author: Uzima Team <team@uzima.org>
homepage: https://github.com/uzima/uzima-sdk-flutter

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  local_auth: ^2.1.0
  flutter_secure_storage: ^9.0.0
  firebase_messaging: ^14.0.0
  dio: ^5.0.0
  crypto: ^3.0.2
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.uzima.flutter_sdk
        pluginClass: UzimaFlutterPlugin
      ios:
        pluginClass: UzimaFlutterPlugin
