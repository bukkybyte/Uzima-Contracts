[book]
title = "Stellar Uzima Contract Documentation"
description = "Comprehensive documentation for the Stellar Uzima decentralized medical records smart contract ecosystem"
authors = ["Stellar Uzima Contributors"]
language = "en"
multilingual = false
src = "."

[build]
build-dir = "book"
create-missing = false

[output.html]
theme = "default"
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/Stellar-Uzima/Uzima-Contracts"
git-repository-icon = "fa-github"
edit-url-template = "https://github.com/Stellar-Uzima/Uzima-Contracts/edit/main/docs/site/{path}"
site-url = "/Uzima-Contracts/"
no-section-label = false

[output.html.search]
enable = true
limit-results = 30
teaser-word-count = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
